<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Tribe - Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0714;color:#fff;min-height:100vh;padding:28px;overflow-x:hidden;}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:gap;}
  header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .live-badge{display:flex;align-items:center;gap:8px;background:#0f2d1a;border:1px solid #166534;border-radius:20px;padding:8px 16px;font-size:13px;color:#4ade80;font-weight:600;}
  .live-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:blink 1.2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .chat-toggle-btn{padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;}
  .chat-toggle-btn.closed{background:#1a1630;color:#a78bfa;border:1.5px solid #a78bfa;}
  .chat-toggle-btn.open{background:#166534;color:#4ade80;border:1.5px solid #4ade80;}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px;}
  .stat-card{background:#13102a;border:1px solid #2d2450;border-radius:16px;padding:18px;text-align:center;}
  .stat-num{font-size:38px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px;}
  .stat-label{font-size:11px;color:#6b7280;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
  .main-grid{display:grid;grid-template-columns:1fr 380px;gap:20px;margin-bottom:28px;}
  .tribes-grid{display:flex;flex-direction:column;gap:14px;}
  .tribe-card{background:#13102a;border:1px solid #2d2450;border-radius:16px;padding:18px;transition:border-color 0.3s;position:relative;overflow:hidden;}
  .tribe-card-glow{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:0.1;pointer-events:none;}
  .tribe-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .tribe-emoji-box{font-size:26px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
  .tribe-info h3{font-size:15px;font-weight:700;margin-bottom:2px;}
  .tribe-info span{font-size:12px;color:#6b7280;}
  .bar-track{height:7px;background:#1f1a2e;border-radius:4px;overflow:hidden;margin-bottom:6px;}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1);width:0%;}
  .bar-row{display:flex;justify-content:space-between;font-size:12px;}
  .bar-count{font-weight:700;color:#e5e7eb;}
  .bar-pct{color:#6b7280;}
  /* Chat panel */
  .chat-panel{background:#13102a;border:1px solid #2d2450;border-radius:16px;display:flex;flex-direction:column;height:600px;}
  .chat-panel-header{padding:16px 18px;border-bottom:1px solid #2d2450;}
  .chat-panel-header h3{font-size:14px;font-weight:700;color:#e5e7eb;margin-bottom:4px;}
  .chat-panel-header p{font-size:12px;color:#6b7280;}
  .chat-filter-tabs{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid #2d2450;flex-wrap:wrap;}
  .cf-tab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #2d2450;background:#0a0714;color:#6b7280;transition:all 0.15s;white-space:nowrap;}
  .cf-tab.active{background:#1e1040;border-color:#a78bfa;color:#a78bfa;}
  .chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
  .cm{padding:8px 12px;border-radius:10px;background:#1a1630;border:1px solid #2d2450;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .cm-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
  .cm-nick{font-size:12px;font-weight:700;}
  .cm-tribe{font-size:11px;opacity:0.6;}
  .cm-text{font-size:13px;color:#d1d5db;word-break:break-word;}
  .cm.fact{border-left:2px solid #f472b6;}
  .empty-chat{text-align:center;color:#4b5563;padding:40px 20px;font-size:13px;}
  /* Cluster */
  .cluster-btn{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;display:block;margin:0 auto 24px;}
  .cluster-btn:hover{opacity:0.9;transform:translateY(-2px);}
  #cluster-viz{display:none;margin-bottom:28px;}
  #cluster-viz.show{display:block;}
  .cluster-wrap{background:#13102a;border:1px solid #2d2450;border-radius:16px;padding:20px;text-align:center;}
  canvas{max-width:100%;}
  .section-title{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#6b7280;margin-bottom:14px;}
</style>
</head>
<body>

<header>
  <h1>Find Your Tribe</h1>
  <div class="header-right">
    <button class="chat-toggle-btn closed" id="chat-toggle-btn" onclick="toggleChat()">Open Tribe Chats</button>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
</header>

<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="total-count">0</div><div class="stat-label">Responses</div></div>
  <div class="stat-card"><div class="stat-num" id="tribe-count">5</div><div class="stat-label">Tribes</div></div>
  <div class="stat-card"><div class="stat-num" id="top-tribe-emoji">-</div><div class="stat-label">Biggest Tribe</div></div>
  <div class="stat-card"><div class="stat-num" id="msg-count">0</div><div class="stat-label">Messages</div></div>
</div>

<div class="main-grid">
  <div class="tribes-grid" id="tribes-grid"></div>
  <div class="chat-panel">
    <div class="chat-panel-header">
      <h3>Live Chat Feed</h3>
      <p>All tribe and common room messages appear here</p>
    </div>
    <div class="chat-filter-tabs">
      <div class="cf-tab active" onclick="filterChat('all',this)">All</div>
      <div class="cf-tab" onclick="filterChat('common',this)">Common Room</div>
      <div class="cf-tab" onclick="filterChat('Night Owls',this)">Night Owls</div>
      <div class="cf-tab" onclick="filterChat('Dream Builders',this)">Dream Builders</div>
      <div class="cf-tab" onclick="filterChat('Quiet Rebels',this)">Quiet Rebels</div>
      <div class="cf-tab" onclick="filterChat('Fire Starters',this)">Fire Starters</div>
      <div class="cf-tab" onclick="filterChat('Free Spirits',this)">Free Spirits</div>
    </div>
    <div class="chat-messages" id="chat-feed"><div class="empty-chat">Chat messages will appear here once the chat is opened</div></div>
  </div>
</div>

<button class="cluster-btn" onclick="showCluster()">Show AI Clustering on Screen</button>

<div id="cluster-viz">
  <div class="section-title">AI Cluster Map</div>
  <div class="cluster-wrap"><canvas id="cluster-canvas" width="760" height="400"></canvas></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKoOj5dk0esNVsB_lpYFD1ppRRl7BFP04",
  authDomain: "find-your-tribe-aa31b.firebaseapp.com",
  databaseURL: "https://find-your-tribe-aa31b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "find-your-tribe-aa31b",
  storageBucket: "find-your-tribe-aa31b.firebasestorage.app",
  messagingSenderId: "604238499467",
  appId: "1:604238499467:web:cff438ceab4616abb2ce8e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TRIBES = [
  {name:"The Night Owls",emoji:"🌙",color:"#7c3aed",bg:"#4c1d95"},
  {name:"The Dream Builders",emoji:"⚡",color:"#d97706",bg:"#92400e"},
  {name:"The Quiet Rebels",emoji:"🌊",color:"#0d9488",bg:"#134e4a"},
  {name:"The Fire Starters",emoji:"🔥",color:"#dc2626",bg:"#7f1d1d"},
  {name:"The Free Spirits",emoji:"🦋",color:"#2563eb",bg:"#1e3a8a"}
];

let tribeCounts={}, allResponses=[], chatOpen=false, currentFilter='all', allMessages=[];
TRIBES.forEach(t=>tribeCounts[t.name]=0);

// Build tribe cards
const grid=document.getElementById('tribes-grid');
TRIBES.forEach(tribe=>{
  const card=document.createElement('div');
  card.className='tribe-card';
  card.id='card-'+tribe.name.replace(/\s/g,'-');
  card.innerHTML=`
    <div class="tribe-card-glow" style="background:${tribe.color}"></div>
    <div class="tribe-header">
      <div class="tribe-emoji-box" style="background:${tribe.bg}30;border:1px solid ${tribe.color}40">${tribe.emoji}</div>
      <div class="tribe-info"><h3 style="color:${tribe.color}">${tribe.name}</h3><span id="mem-${tribe.name.replace(/\s/g,'-')}">0 members</span></div>
    </div>
    <div class="bar-track"><div class="bar-fill" style="background:${tribe.color}" id="bar-${tribe.name.replace(/\s/g,'-')}"></div></div>
    <div class="bar-row">
      <span class="bar-count" id="cnt-${tribe.name.replace(/\s/g,'-')}">0 students</span>
      <span class="bar-pct" id="pct-${tribe.name.replace(/\s/g,'-')}">0%</span>
    </div>`;
  grid.appendChild(card);
});

function updateUI(){
  const total=allResponses.length;
  document.getElementById('total-count').textContent=total;
  let maxT=TRIBES[0];
  TRIBES.forEach(t=>{if((tribeCounts[t.name]||0)>(tribeCounts[maxT.name]||0))maxT=t;});
  document.getElementById('top-tribe-emoji').textContent=total>0?maxT.emoji:'-';
  TRIBES.forEach(tribe=>{
    const cnt=tribeCounts[tribe.name]||0;
    const pct=total>0?Math.round((cnt/total)*100):0;
    const key=tribe.name.replace(/\s/g,'-');
    const el=id=>document.getElementById(id+'-'+key);
    if(el('bar'))el('bar').style.width=pct+'%';
    if(el('cnt'))el('cnt').textContent=cnt+' student'+(cnt!==1?'s':'');
    if(el('pct'))el('pct').textContent=pct+'%';
    if(el('mem'))el('mem').textContent=cnt+' member'+(cnt!==1?'s':'');
    const card=document.getElementById('card-'+key);
    if(card)card.style.borderColor=cnt>0?tribe.color+'60':'#2d2450';
  });
}

onValue(ref(db,'responses'),snap=>{
  allResponses=[];
  TRIBES.forEach(t=>tribeCounts[t.name]=0);
  const data=snap.val()||{};
  Object.values(data).forEach(r=>{
    allResponses.push(r);
    if(r.tribe&&tribeCounts[r.tribe]!==undefined)tribeCounts[r.tribe]++;
  });
  updateUI();
});

// Chat open/close toggle
onValue(ref(db,'chatOpen'),snap=>{
  chatOpen=snap.val()===true;
  const btn=document.getElementById('chat-toggle-btn');
  btn.textContent=chatOpen?'Close Tribe Chats':'Open Tribe Chats';
  btn.className='chat-toggle-btn '+(chatOpen?'open':'closed');
});

window.toggleChat=function(){
  set(ref(db,'chatOpen'),!chatOpen);
};

// Aggregate all chat messages
let msgTotal=0;
function listenRoom(roomKey,tribeName,tribeColor,tribeEmoji){
  onValue(ref(db,roomKey),snap=>{
    const data=snap.val()||{};
    const msgs=Object.values(data).map(m=>({...m,_room:tribeName,_color:tribeColor,_emoji:tribeEmoji}));
    // Remove old msgs from this room, add new
    allMessages=allMessages.filter(m=>m._room!==tribeName);
    allMessages.push(...msgs);
    allMessages.sort((a,b)=>a.ts-b.ts);
    msgTotal=allMessages.length;
    document.getElementById('msg-count').textContent=msgTotal;
    renderChatFeed();
  });
}

TRIBES.forEach(t=>listenRoom('chat_'+t.name.replace(/\s/g,'_'),'The '+t.name.split(' ').slice(1).join(' ')===t.name?t.name:t.name,t.color,t.emoji));
listenRoom('chat_common','Common Room','#6b7280','🌐');

window.filterChat=function(filter,el){
  currentFilter=filter;
  document.querySelectorAll('.cf-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderChatFeed();
};

function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderChatFeed(){
  const feed=document.getElementById('chat-feed');
  let msgs=allMessages;
  if(currentFilter!=='all'){
    if(currentFilter==='common') msgs=msgs.filter(m=>m._room==='Common Room');
    else msgs=msgs.filter(m=>m._room.includes(currentFilter));
  }
  if(msgs.length===0){
    feed.innerHTML='<div class="empty-chat">No messages yet in this room</div>';
    return;
  }
  feed.innerHTML='';
  msgs.slice(-60).forEach(m=>{
    const div=document.createElement('div');
    div.className='cm'+(m.type==='fact'?' fact':'');
    div.innerHTML=`
      <div class="cm-top">
        <span style="font-size:14px">${m._emoji||'💬'}</span>
        <span class="cm-nick" style="color:${m._color||'#a78bfa'}">${escHtml(m.nick||'Anonymous')}</span>
        <span class="cm-tribe">${m._room}</span>
      </div>
      <div class="cm-text">${m.type==='fact'?'Fun fact: ':''}${escHtml(m.text||'')}</div>`;
    feed.appendChild(div);
  });
  feed.scrollTop=feed.scrollHeight;
}

// Cluster viz
window.showCluster=function(){
  const viz=document.getElementById('cluster-viz');
  viz.classList.add('show');
  viz.scrollIntoView({behavior:'smooth',block:'start'});
  drawCluster();
};

function drawCluster(){
  const canvas=document.getElementById('cluster-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const centers=[{x:0.22,y:0.3},{x:0.75,y:0.22},{x:0.5,y:0.68},{x:0.15,y:0.72},{x:0.82,y:0.7}];
  ctx.strokeStyle='rgba(167,139,250,0.05)';ctx.lineWidth=1;
  TRIBES.forEach((_,i)=>TRIBES.forEach((_,j)=>{
    if(i>=j)return;
    ctx.beginPath();ctx.moveTo(centers[i].x*W,centers[i].y*H);ctx.lineTo(centers[j].x*W,centers[j].y*H);ctx.stroke();
  }));
  TRIBES.forEach((tribe,i)=>{
    const cnt=tribeCounts[tribe.name]||0;
    const cx=centers[i].x*W,cy=centers[i].y*H;
    const radius=Math.max(28,Math.min(80,26+cnt*2.8));
    ctx.beginPath();ctx.arc(cx,cy,radius+12,0,Math.PI*2);ctx.fillStyle=tribe.color+'15';ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fillStyle=tribe.color+'28';ctx.fill();
    ctx.strokeStyle=tribe.color+'99';ctx.lineWidth=2;ctx.stroke();
    for(let d=0;d<Math.min(cnt,25);d++){
      const angle=(d/Math.min(cnt,25))*Math.PI*2;
      const spread=(radius-8)*(0.3+Math.random()*0.6);
      ctx.beginPath();ctx.arc(cx+Math.cos(angle)*spread*(0.7+Math.random()*0.5),cy+Math.sin(angle)*spread*(0.7+Math.random()*0.5),3,0,Math.PI*2);
      ctx.fillStyle=tribe.color+'bb';ctx.fill();
    }
    ctx.font=`${Math.round(radius*0.6)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tribe.emoji,cx,cy-6);
    ctx.font='bold 13px -apple-system,sans-serif';ctx.fillStyle='#fff';ctx.fillText(cnt,cx,cy+radius*0.55);
    ctx.font='bold 11px -apple-system,sans-serif';ctx.fillStyle=tribe.color;ctx.fillText(tribe.name,cx,cy+radius+16);
  });
}
</script>
</body>
</html>
