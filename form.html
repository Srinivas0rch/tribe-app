<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Tribe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0c1a; color: #fff;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px;
  }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  .header p { font-size: 14px; color: #9ca3af; }
  .progress-bar { width: 100%; max-width: 400px; height: 4px; background: #1f1a2e; border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #f472b6); border-radius: 2px; transition: width 0.4s ease; }
  .card { background: #1a1630; border: 1px solid #2d2450; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 400px; margin-bottom: 16px; }
  .question-num { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: #a78bfa; text-transform: uppercase; margin-bottom: 10px; }
  .question-text { font-size: 20px; font-weight: 600; color: #f3f4f6; margin-bottom: 20px; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #0f0c1a; border: 1.5px solid #2d2450; border-radius: 12px; padding: 14px 16px; color: #e5e7eb; font-size: 15px; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
  .option-btn:hover { border-color: #a78bfa; background: #1a1630; }
  .option-btn.selected { border-color: #a78bfa; background: #1e1040; color: #fff; }
  .option-btn .emoji { font-size: 20px; width: 28px; text-align: center; }
  .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 4px; }
  .emoji-btn { background: #0f0c1a; border: 1.5px solid #2d2450; border-radius: 12px; padding: 12px 8px; font-size: 24px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .emoji-btn:hover { border-color: #a78bfa; }
  .emoji-btn.selected { border-color: #f472b6; background: #1e1040; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px; margin-top: 8px; }
  .btn { padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; flex: 1; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: #6b7280; border: 1px solid #2d2450; margin-right: 12px; padding: 14px 20px; }
  .btn-ghost:hover { color: #9ca3af; border-color: #4b5563; }
  .reveal { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 400px; }
  .reveal.show { display: flex; }
  .tribe-orb { width: 140px; height: 140px; border-radius: 50%; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; font-size: 52px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:0.9} }
  .tribe-label { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.7; }
  .tribe-name { font-size: 32px; font-weight: 800; margin-bottom: 12px; line-height: 1.2; }
  .tribe-desc { font-size: 16px; color: #9ca3af; line-height: 1.6; margin-bottom: 28px; max-width: 300px; }
  .tribe-count { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
  /* Nickname + chat entry */
  .nick-box { width: 100%; max-width: 400px; background: #1a1630; border: 1px solid #2d2450; border-radius: 20px; padding: 24px; margin-bottom: 16px; display: none; }
  .nick-box.show { display: block; }
  .nick-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .nick-box p { font-size: 14px; color: #9ca3af; margin-bottom: 16px; }
  .nick-input { width: 100%; background: #0f0c1a; border: 1.5px solid #2d2450; border-radius: 12px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none; margin-bottom: 12px; }
  .nick-input:focus { border-color: #a78bfa; }
  .chat-locked { text-align: center; color: #6b7280; font-size: 14px; padding: 20px; background: #1a1630; border: 1px solid #2d2450; border-radius: 16px; width: 100%; max-width: 400px; display: none; }
  .chat-locked.show { display: block; }
  /* Chat screen */
  .chat-screen { display: none; flex-direction: column; width: 100%; max-width: 440px; height: 90vh; }
  .chat-screen.show { display: flex; }
  .chat-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid #2d2450; background: #0f0c1a; color: #9ca3af; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
  .tab.active { border-color: #a78bfa; background: #1e1040; color: #fff; }
  .chat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 12px 16px; background: #1a1630; border-radius: 14px; border: 1px solid #2d2450; }
  .chat-header .ch-emoji { font-size: 22px; }
  .chat-header .ch-name { font-size: 15px; font-weight: 700; }
  .chat-header .ch-sub { font-size: 12px; color: #6b7280; }
  .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 4px 0; margin-bottom: 12px; }
  .msg { padding: 10px 14px; border-radius: 14px; max-width: 88%; font-size: 14px; line-height: 1.5; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .msg.mine { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.theirs { background: #1a1630; border: 1px solid #2d2450; color: #e5e7eb; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.fact { border-left: 3px solid #f472b6; background: #1e1040; }
  .msg-meta { font-size: 11px; margin-bottom: 3px; opacity: 0.6; }
  .msg-text { word-break: break-word; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-input { flex: 1; background: #1a1630; border: 1.5px solid #2d2450; border-radius: 12px; padding: 12px 14px; color: #fff; font-size: 14px; outline: none; resize: none; max-height: 100px; font-family: inherit; }
  .msg-input:focus { border-color: #a78bfa; }
  .send-btn { background: linear-gradient(135deg, #7c3aed, #db2777); border: none; border-radius: 12px; width: 44px; height: 44px; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .fact-btn { background: #1a1630; border: 1.5px solid #2d2450; border-radius: 12px; padding: 8px 12px; color: #a78bfa; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 8px; width: 100%; text-align: center; transition: all 0.2s; }
  .fact-btn:hover { border-color: #a78bfa; }
  .loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px; }
  .loading.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid #2d2450; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading p { color: #9ca3af; font-size: 15px; }
  .sys-msg { text-align: center; font-size: 12px; color: #4b5563; padding: 6px; }
</style>
</head>
<body>

<div id="form-view" style="width:100%;display:flex;flex-direction:column;align-items:center;">
  <div class="header"><h1>Find Your Tribe</h1><p>Answer 5 quick questions - AI will find your people</p></div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:20%"></div></div>
  <div class="card" id="question-card">
    <div class="question-num" id="q-num">Question 1 of 5</div>
    <div class="question-text" id="q-text"></div>
    <div id="q-options"></div>
  </div>
  <div class="nav-row">
    <button class="btn btn-ghost" id="back-btn" onclick="prevQuestion()" style="display:none">Back</button>
    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>Continue</button>
  </div>
</div>

<div class="loading" id="loading-view">
  <div class="spinner"></div><p>Finding your tribe...</p>
</div>

<div class="reveal" id="reveal-view">
  <div class="tribe-orb" id="tribe-orb"></div>
  <div class="tribe-label">You are</div>
  <div class="tribe-name" id="tribe-name"></div>
  <div class="tribe-desc" id="tribe-desc"></div>
  <div class="tribe-count" id="tribe-count"></div>
</div>

<div class="nick-box" id="nick-box">
  <h3>Pick a nickname</h3>
  <p>This is how you'll appear in your tribe chat</p>
  <input class="nick-input" id="nick-input" placeholder="e.g. StarGazer, CodeMonkey..." maxlength="20">
  <button class="btn btn-primary" style="width:100%" onclick="enterChat()">Enter Tribe Chat</button>
</div>

<div class="chat-locked" id="chat-locked">
  <p style="font-size:22px;margin-bottom:8px">Chat opens soon</p>
  <p>The presenter will unlock tribe chats in a moment. Stay on this screen.</p>
</div>

<div class="chat-screen" id="chat-screen">
  <div class="chat-tabs">
    <div class="tab active" id="tab-tribe" onclick="switchRoom('tribe')">My Tribe</div>
    <div class="tab" id="tab-common" onclick="switchRoom('common')">Common Room</div>
  </div>
  <div class="chat-header" id="chat-header"></div>
  <div class="messages" id="messages"></div>
  <button class="fact-btn" onclick="sendFact()">Share a fun fact about yourself</button>
  <div class="input-row">
    <textarea class="msg-input" id="msg-input" placeholder="Say something to your tribe..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">&#10148;</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKoOj5dk0esNVsB_lpYFD1ppRRl7BFP04",
  authDomain: "find-your-tribe-aa31b.firebaseapp.com",
  databaseURL: "https://find-your-tribe-aa31b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "find-your-tribe-aa31b",
  storageBucket: "find-your-tribe-aa31b.firebasestorage.app",
  messagingSenderId: "604238499467",
  appId: "1:604238499467:web:cff438ceab4616abb2ce8e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const BAD_WORDS = ["fuck","shit","ass","bitch","bastard","damn","crap","piss","dick","cunt","nigger","faggot","slut","whore","retard","idiot"];
function hasBadWord(text) {
  const lower = text.toLowerCase();
  return BAD_WORDS.some(w => lower.includes(w));
}

const questions = [
  { text: "What's your music vibe?", options: [
    {emoji:"🎸",label:"Rock / Metal",value:1},{emoji:"🎵",label:"Pop / R&B",value:2},
    {emoji:"🎧",label:"EDM / Hip-hop",value:3},{emoji:"🎻",label:"Classical / Jazz",value:4},{emoji:"🌍",label:"Folk / Indie",value:5}]},
  { text: "When do you come alive?", options: [
    {emoji:"🌅",label:"Early bird - up before 7am",value:1},{emoji:"☀️",label:"Morning person - 7–10am",value:2},
    {emoji:"🌤️",label:"Afternoon - peak after lunch",value:3},{emoji:"🌙",label:"Night owl - best after 10pm",value:4}]},
  { text: "Your dream career?", options: [
    {emoji:"💡",label:"Build something / Entrepreneur",value:1},{emoji:"🎨",label:"Create / Artist / Designer",value:2},
    {emoji:"🔬",label:"Discover / Researcher / Scientist",value:3},{emoji:"🤝",label:"Lead / Manager / Politician",value:4},{emoji:"✈️",label:"Explore / Travel / Experience",value:5}]},
  { text: "How do you recharge?", options: [
    {emoji:"🎉",label:"Big social gatherings",value:1},{emoji:"👥",label:"Small group of close friends",value:2},
    {emoji:"🎮",label:"Solo - games, music, hobbies",value:3},{emoji:"📚",label:"Solo - reading, reflecting",value:4}]},
  { text: "Pick the emoji that is SO you:", type:"emoji", options:["🔥","⚡","🌊","🌿","🎯","💎","🌙","☀️","🦋","🐺"]}
];

const tribes = [
  {name:"The Night Owls",desc:"Creative, deep thinkers who do their best work when the world is quiet.",color:"#7c3aed",bg:"linear-gradient(135deg,#4c1d95,#7c3aed)",emoji:"🌙",vector:[3,4,2,3.5]},
  {name:"The Dream Builders",desc:"Ambitious and future-focused. You don't just have big dreams - you're already building them.",color:"#d97706",bg:"linear-gradient(135deg,#92400e,#d97706)",emoji:"⚡",vector:[2,2,1,2]},
  {name:"The Quiet Rebels",desc:"Introverted but fiercely original. You challenge norms silently but powerfully.",color:"#0d9488",bg:"linear-gradient(135deg,#134e4a,#0d9488)",emoji:"🌊",vector:[5,3,3,4]},
  {name:"The Fire Starters",desc:"The energy of every room. You make things happen and bring everyone along.",color:"#dc2626",bg:"linear-gradient(135deg,#7f1d1d,#dc2626)",emoji:"🔥",vector:[2,1,4,1]},
  {name:"The Free Spirits",desc:"Curious, adaptable, impossible to box in. Drawn to experiences over possessions.",color:"#2563eb",bg:"linear-gradient(135deg,#1e3a8a,#2563eb)",emoji:"🦋",vector:[3,3,5,2]}
];

let current=0, answers=[], myTribe=null, myNick="", currentRoom="tribe";

function assignTribe(ans) {
  const v = ans.slice(0,4);
  let best=0, bestDist=Infinity;
  tribes.forEach((t,i)=>{
    const dist=Math.sqrt(t.vector.reduce((s,tv,j)=>s+Math.pow(tv-(v[j]||3),2),0));
    if(dist<bestDist){bestDist=dist;best=i;}
  });
  return tribes[best];
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `Question ${current+1} of 5`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress').style.width = `${((current+1)/5)*100}%`;
  document.getElementById('back-btn').style.display = current>0?'block':'none';
  document.getElementById('next-btn').disabled = !answers[current];
  const container = document.getElementById('q-options');
  container.innerHTML='';
  if(q.type==='emoji'){
    const grid=document.createElement('div'); grid.className='emoji-grid';
    q.options.forEach((em,i)=>{
      const btn=document.createElement('button');
      btn.className='emoji-btn'+(answers[current]===i+1?' selected':'');
      btn.textContent=em;
      btn.onclick=()=>{answers[current]=i+1;grid.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById('next-btn').disabled=false;};
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  } else {
    const opts=document.createElement('div'); opts.className='options';
    q.options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='option-btn'+(answers[current]===opt.value?' selected':'');
      btn.innerHTML=`<span class="emoji">${opt.emoji}</span><span>${opt.label}</span>`;
      btn.onclick=()=>{answers[current]=opt.value;opts.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById('next-btn').disabled=false;};
      opts.appendChild(btn);
    });
    container.appendChild(opts);
  }
}

window.nextQuestion = function() {
  if(current<4){current++;renderQuestion();}
  else{submitAndReveal();}
};
window.prevQuestion = function() {
  if(current>0){current--;renderQuestion();}
};

async function submitAndReveal() {
  document.getElementById('form-view').style.display='none';
  document.getElementById('loading-view').classList.add('show');
  myTribe = assignTribe(answers);
  await push(ref(db,'responses'),{q1:answers[0],q2:answers[1],q3:answers[2],q4:answers[3],q5:answers[4],tribe:myTribe.name,ts:Date.now()});
  setTimeout(()=>{
    document.getElementById('loading-view').classList.remove('show');
    showReveal();
  },1800);
}

function showReveal() {
  const reveal=document.getElementById('reveal-view');
  reveal.classList.add('show');
  const orb=document.getElementById('tribe-orb');
  orb.style.background=myTribe.bg; orb.textContent=myTribe.emoji;
  document.getElementById('tribe-name').textContent=myTribe.name;
  document.getElementById('tribe-name').style.color=myTribe.color;
  document.getElementById('tribe-desc').textContent=myTribe.desc;
  onValue(ref(db,'responses'),snap=>{
    const data=snap.val()||{};
    const cnt=Object.values(data).filter(r=>r.tribe===myTribe.name).length;
    document.getElementById('tribe-count').textContent=`${cnt} student${cnt!==1?'s':''} in your tribe so far`;
  },{onlyOnce:true});

  // Check if chat is open
  onValue(ref(db,'chatOpen'),snap=>{
    const isOpen=snap.val()===true;
    if(isOpen){
      document.getElementById('nick-box').classList.add('show');
    } else {
      document.getElementById('chat-locked').classList.add('show');
      // Keep polling until opened
      const unsub=onValue(ref(db,'chatOpen'),s=>{
        if(s.val()===true){
          document.getElementById('chat-locked').classList.remove('show');
          document.getElementById('nick-box').classList.add('show');
          unsub();
        }
      });
    }
  },{onlyOnce:true});
}

window.enterChat = function() {
  const nick = document.getElementById('nick-input').value.trim();
  if(!nick){alert('Please enter a nickname');return;}
  if(hasBadWord(nick)){alert('Please choose a different nickname');return;}
  myNick=nick;
  document.getElementById('nick-box').classList.remove('show');
  document.getElementById('reveal-view').classList.remove('show');
  openChatScreen();
};

function openChatScreen() {
  document.getElementById('chat-screen').classList.add('show');
  switchRoom('tribe');
}

window.switchRoom = function(room) {
  currentRoom=room;
  document.getElementById('tab-tribe').classList.toggle('active',room==='tribe');
  document.getElementById('tab-common').classList.toggle('active',room==='common');
  const header=document.getElementById('chat-header');
  if(room==='tribe'){
    header.innerHTML=`<span class="ch-emoji">${myTribe.emoji}</span><div><div class="ch-name" style="color:${myTribe.color}">${myTribe.name}</div><div class="ch-sub">Only your tribe can see this</div></div>`;
  } else {
    header.innerHTML=`<span class="ch-emoji">🌐</span><div><div class="ch-name">Common Room</div><div class="ch-sub">All tribes are here</div></div>`;
  }
  loadMessages(room);
};

let msgUnsub=null;
function loadMessages(room) {
  const msgEl=document.getElementById('messages');
  msgEl.innerHTML='<div class="sys-msg">Loading messages...</div>';
  if(msgUnsub) msgUnsub();
  const roomKey = room==='tribe' ? 'chat_'+myTribe.name.replace(/\s/g,'_') : 'chat_common';
  msgUnsub=onValue(ref(db,roomKey),snap=>{
    const data=snap.val()||{};
    const msgs=Object.values(data).sort((a,b)=>a.ts-b.ts);
    msgEl.innerHTML='';
    if(msgs.length===0){
      msgEl.innerHTML='<div class="sys-msg">No messages yet. Say hello!</div>';
      return;
    }
    msgs.forEach(m=>{
      const div=document.createElement('div');
      div.className='msg '+(m.nick===myNick?'mine':'theirs')+(m.type==='fact'?' fact':'');
      div.innerHTML=`<div class="msg-meta">${m.nick}${m.tribeName&&room==='common'?' · '+m.tribeName:''}</div><div class="msg-text">${m.type==='fact'?'Fun fact: ':''} ${escHtml(m.text)}</div>`;
      msgEl.appendChild(div);
    });
    msgEl.scrollTop=msgEl.scrollHeight;
  });
}

function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function postMessage(text,type='text'){
  if(!text.trim())return;
  if(hasBadWord(text)){alert('Your message contains inappropriate language. Please keep it friendly!');return;}
  const roomKey=currentRoom==='tribe'?'chat_'+myTribe.name.replace(/\s/g,'_'):'chat_common';
  await push(ref(db,roomKey),{nick:myNick,text:text.trim(),type,tribeName:myTribe.name,tribeColor:myTribe.color,tribeEmoji:myTribe.emoji,ts:Date.now()});
}

window.sendMessage=function(){
  const inp=document.getElementById('msg-input');
  postMessage(inp.value); inp.value='';
};

window.handleKey=function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.sendMessage();}
};

window.sendFact=function(){
  const fact=prompt('Share a fun fact about yourself:');
  if(fact&&fact.trim()) postMessage(fact,'fact');
};

renderQuestion();
</script>
</body>
</html>
